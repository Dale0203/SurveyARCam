<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>SurveyARCam — 3D 傾斜地圖導引</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, "Microsoft JhengHei", "PingFang TC", sans-serif; }
  #map { position: absolute; inset: 0; }

  /* ---- 頂部列 ---- */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 5;
    padding: max(10px, env(safe-area-inset-top)) 12px 10px;
    background: linear-gradient(to bottom, rgba(0,0,0,.55), rgba(0,0,0,0));
    color: #fff; pointer-events: none;
  }
  #topbar h1 { margin: 0; font-size: 16px; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,.6); }
  #topbar .sub { font-size: 12px; opacity: .85; margin-top: 2px; text-shadow: 0 1px 3px rgba(0,0,0,.6); }

  /* ---- 無資料提示 ---- */
  #hint {
    position: absolute; inset: 0; z-index: 20; display: none;
    align-items: center; justify-content: center; flex-direction: column; gap: 10px;
    background: rgba(20,20,24,.88); color: #fff; text-align: center; padding: 24px;
  }
  #hint.show { display: flex; }
  #hint .big { font-size: 40px; }
  #hint p { max-width: 320px; line-height: 1.6; font-size: 14px; opacity: .9; }

  /* ---- 底部/浮動控制鈕 ---- */
  #controls {
    position: absolute; right: 12px; bottom: max(16px, env(safe-area-inset-bottom)); z-index: 6;
    display: flex; flex-direction: column; gap: 10px; align-items: flex-end;
  }
  .fab {
    min-width: 44px; height: 44px; padding: 0 14px; border-radius: 22px; border: none;
    background: rgba(30,30,34,.85); color: #fff; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.35);
    backdrop-filter: blur(4px);
  }
  .fab:active { background: rgba(60,60,66,.9); }
  .fab.on { background: #1a73e8; }
  .fab .ic { font-size: 17px; }

  #status {
    position: absolute; left: 12px; bottom: calc(max(16px, env(safe-area-inset-bottom)) + 54px); z-index: 6;
    background: rgba(20,20,24,.7); color: #fff; font-size: 11px; padding: 6px 10px; border-radius: 8px;
    max-width: 62vw; line-height: 1.5; pointer-events: none;
  }

  /* ---- 底部抽屜點位清單 ---- */
  #prog-cap {
    position: absolute; left: 12px; bottom: max(16px, env(safe-area-inset-bottom)); z-index: 7;
    height: 44px; padding: 0 16px; border-radius: 22px; border: none; display: none;
    background: rgba(30,30,34,.85); color: #fff; font-size: 13px; font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,.35); backdrop-filter: blur(4px);
  }
  #prog-cap.avail { display: block; }
  #drawer {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 8;
    max-height: 45vh; background: #fff; color: #222;
    border-radius: 16px 16px 0 0; box-shadow: 0 -4px 16px rgba(0,0,0,.25);
    display: flex; flex-direction: column;
    transform: translateY(105%); transition: transform .25s ease;
  }
  #drawer.open { transform: none; }
  #drawer-head {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    border-bottom: 1px solid #e8e8e8; flex: none;
  }
  #drawer-title { font-size: 14px; font-weight: 700; flex: 1; }
  .dw-btn {
    min-height: 40px; padding: 0 14px; border-radius: 10px; border: none;
    font-size: 13px; font-weight: 600; background: #eef3fd; color: #1a56b8;
  }
  .dw-btn:active { background: #dbe7fb; }
  #pt-list {
    list-style: none; margin: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 0 0 max(8px, env(safe-area-inset-bottom));
  }
  .pt-row {
    display: flex; align-items: center; gap: 8px; min-height: 52px;
    padding: 4px 10px 4px 12px; border-bottom: 1px solid #f2f2f2; cursor: pointer;
  }
  .pt-row.done { opacity: .45; background: #fafafa; }
  .pt-row.hl { background: #e8f0fe; }
  .pt-num { font-weight: 700; min-width: 24px; text-align: right; color: #555; flex: none; font-size: 13px; }
  .pt-color { width: 12px; height: 12px; border-radius: 3px; flex: none; }
  .pt-name {
    flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-size: 13px;
  }
  .pt-check {
    width: 40px; height: 40px; flex: none; display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .pt-check input { width: 22px; height: 22px; accent-color: #1a73e8; }
  .pt-btn {
    min-width: 44px; height: 40px; flex: none; display: flex; align-items: center; justify-content: center;
    border-radius: 10px; font-size: 12px; font-weight: 600; text-decoration: none;
    background: #eef3fd; color: #1a56b8; padding: 0 8px;
  }
  .pt-btn:active { background: #dbe7fb; }

  /* 完成/高亮的地圖 mark */
  .mk { transition: transform .2s, opacity .2s, filter .2s; }
  .mk.mk-done { filter: grayscale(1); opacity: .4; }
  .mk.mk-hi { transform: rotate(-45deg) scale(1.5); z-index: 5; }

  #toast {
    position: absolute; left: 50%; top: 70px; transform: translateX(-50%) translateY(-10px);
    background: rgba(20,20,24,.92); color: #fff; padding: 9px 16px; border-radius: 20px;
    font-size: 13px; z-index: 30; opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none;
    max-width: 86vw; text-align: center;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---- 點位標記 ---- */
  .mk {
    width: 30px; height: 30px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,.45); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .mk span { transform: rotate(45deg); color: #fff; font-weight: 700; font-size: 12px; text-shadow: 0 1px 2px rgba(0,0,0,.4); }

  /* ---- popup ---- */
  .maplibregl-popup-content { padding: 12px 14px; border-radius: 10px; font-family: inherit; }
  .pu-title { font-weight: 700; font-size: 14px; margin: 0 0 3px; }
  .pu-cat { font-size: 11px; color: #666; margin: 0 0 6px; }
  .pu-note { font-size: 12px; color: #444; margin: 0 0 8px; }
  .pu-nav {
    display: inline-flex; align-items: center; gap: 5px; background: #1a73e8; color: #fff;
    text-decoration: none; padding: 7px 12px; border-radius: 16px; font-size: 12px; font-weight: 600;
  }

  /* ---- GPS 棋子 ----
     拆兩層：me-ground（貼地層，rotationAlignment/pitchAlignment=map，
     含腳下陰影橢圓＋方向扇形，pitch 60 時會壓扁貼地、隨 heading 旋轉）
     ＋ me-char（看板小人，viewport 對齊永遠面向螢幕、anchor=bottom 腳踩在定位點） */
  .me-ground { width: 1px; height: 1px; }
  .me-shadow {
    position: absolute; left: -16px; top: -8px; width: 32px; height: 16px;
    border-radius: 50%; background: rgba(0,0,0,.28);
  }
  .me-fan {
    position: absolute; left: -18px; top: -58px; width: 0; height: 0;
    border-left: 18px solid transparent; border-right: 18px solid transparent;
    border-bottom: 40px solid rgba(26,115,232,.38);
    transform-origin: 50% 100%;
  }
  .me-char { width: 44px; height: 64px; pointer-events: none; }
  .me-char .char-flip { position: relative; width: 100%; height: 100%; }
  /* 8 朝向 × 5 張圖：全部疊在同位置、opacity 交叉淡化 120ms（只動 opacity，GPU 合成）。
     data-facing 決定哪張 opacity:1；左向系列＝整個 char-flip scaleX(-1)
     （背/正圖近對稱，鏡射無感；不能掛 charEl 因為 MapLibre 會覆寫其 inline transform）。 */
  .me-char svg {
    position: absolute; left: 0; top: 0; width: 100%; height: 100%;
    opacity: 0; transition: opacity .12s linear;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.35));
  }
  .me-char.no-fade svg { transition: none; } /* 連續快切時直接跳結束態，避免殘影疊加 */
  .me-char[data-facing="back"] .v-back,
  .me-char[data-facing="front"] .v-front,
  .me-char[data-facing="right"] .v-side,
  .me-char[data-facing="left"] .v-side,
  .me-char[data-facing="front-right"] .v-qfront,
  .me-char[data-facing="front-left"] .v-qfront,
  .me-char[data-facing="back-right"] .v-qback,
  .me-char[data-facing="back-left"] .v-qback { opacity: 1; }
  .me-char[data-facing="left"] .char-flip,
  .me-char[data-facing="front-left"] .char-flip,
  .me-char[data-facing="back-left"] .char-flip { transform: scaleX(-1); }
  /* 行走動畫：腿 ±25°（髖轉軸）、舉高手臂小幅 ±6°（肩轉軸，避免甩臂打臉），0.6s 交錯。
     只動 transform（GPU 合成、不觸發 layout）；五張視角圖的腿/臂 group 同名 class，動畫全部生效。 */
  .me-char .leg-l, .me-char .leg-r {
    transform-box: fill-box; transform-origin: 50% 8%;
  }
  .me-char .arm-l, .me-char .arm-r {
    transform-box: fill-box; transform-origin: 50% 88%;
  }
  @keyframes walk-swing     { 0%, 100% { transform: rotate(-25deg); } 50% { transform: rotate(25deg); } }
  @keyframes walk-swing-arm { 0%, 100% { transform: rotate(-6deg); } 50% { transform: rotate(6deg); } }
  .me-char.walking .leg-l { animation: walk-swing .6s ease-in-out infinite; }
  .me-char.walking .leg-r { animation: walk-swing .6s ease-in-out infinite -.3s; }
  .me-char.walking .arm-l { animation: walk-swing-arm .6s ease-in-out infinite -.3s; }
  .me-char.walking .arm-r { animation: walk-swing-arm .6s ease-in-out infinite; }
</style>
</head>
<body>

<div id="map"></div>

<div id="topbar">
  <h1 id="proj-name">SurveyARCam 3D 導引</h1>
  <div class="sub" id="proj-sub">尚未載入點位</div>
</div>

<div id="hint">
  <div class="big">📍</div>
  <p id="hint-msg">找不到點位資料。請用 SurveyARCam 產生的「分享連結」開啟本頁（網址需帶 #d= 或 #z=）。</p>
</div>

<div id="toast"></div>

<div id="status"></div>

<div id="controls">
  <button class="fab" id="btn-compass" style="display:none">🧭 啟用方向感應</button>
  <button class="fab" id="btn-locate"><span class="ic">📍</span>定位</button>
  <button class="fab" id="btn-follow"><span class="ic">🎮</span>自由瀏覽</button>
</div>

<button id="prog-cap">進度 0/0 ▲</button>

<div id="drawer">
  <div id="drawer-head">
    <span id="drawer-title">進度 0/0</span>
    <button class="dw-btn" id="btn-next">下一個未拍 ▶</button>
    <button class="dw-btn" id="btn-collapse">收合 ▼</button>
  </div>
  <ul id="pt-list"></ul>
</div>

<script>
(async function () {
  'use strict';

  // =========================================================
  // 1. 分享連結解碼（複製自 js/app.js decodeHashData / base64UrlToBytes）
  // =========================================================
  function base64UrlToBytes(b64url) {
    let b64 = String(b64url).replace(/-/g, '+').replace(/_/g, '/');
    const pad = b64.length % 4;
    if (pad === 1) throw new Error('base64 長度不合法');
    if (pad === 2) b64 += '==';
    else if (pad === 3) b64 += '=';
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  function decodeHashData(hash) {
    try {
      const h = String(hash || '').replace(/^#/, '');
      if (!h) return { ok: false, error: '' };
      const params = new URLSearchParams(h);
      const raw = params.get('d');
      if (!raw) return { ok: false, error: '' };

      let bytes;
      try { bytes = base64UrlToBytes(raw); }
      catch (e) { return { ok: false, error: '連結內的點位資料無法解析（base64 格式錯誤）' }; }

      let jsonText;
      try { jsonText = new TextDecoder('utf-8').decode(bytes); }
      catch (e) { return { ok: false, error: '連結內的點位資料無法解析（文字編碼錯誤）' }; }

      let d;
      try { d = JSON.parse(jsonText); }
      catch (e) { return { ok: false, error: '連結內的點位資料無法解析（JSON 格式錯誤）' }; }

      return { ok: true, data: d, jsonText };
    } catch (e) {
      return { ok: false, error: '連結內的點位資料無法解析' };
    }
  }

  // #z= gzip 壓縮格式（base64url → DecompressionStream('gzip') → UTF-8 → JSON）；
  // 無 z 參數時退回既有 #d= 同步路徑。
  async function decodeAnyHash(hash) {
    const h = String(hash || '').replace(/^#/, '');
    if (!h) return { ok: false, error: '' };
    let z = null;
    try { z = new URLSearchParams(h).get('z'); } catch (e) { /* 交給 #d= 路徑 */ }
    if (z) {
      if (typeof DecompressionStream !== 'function') {
        return { ok: false, error: '此瀏覽器不支援壓縮連結（#z=），請更新系統或改用長連結（#d=）' };
      }
      let bytes;
      try { bytes = base64UrlToBytes(z); }
      catch (e) { return { ok: false, error: '連結內的點位資料無法解析（base64 格式錯誤）' }; }
      try {
        const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
        const buf = await new Response(stream).arrayBuffer();
        const jsonText = new TextDecoder('utf-8').decode(buf);
        const d = JSON.parse(jsonText);
        return { ok: true, data: d, jsonText };
      } catch (e) {
        return { ok: false, error: '連結內的點位資料無法解析（gzip 解壓或 JSON 格式錯誤）' };
      }
    }
    return decodeHashData(hash);
  }

  function validateData(d) {
    const err = (m) => ({ ok: false, error: m });
    if (!d || typeof d !== 'object') return err('JSON 根必須是物件');
    if (!d.project) return err('缺少必填欄位 project');
    if (!d.categories || typeof d.categories !== 'object') return err('缺少必填欄位 categories');
    if (!Array.isArray(d.points) || !d.points.length) return err('points 為空或缺少');
    for (let i = 0; i < d.points.length; i++) {
      const p = d.points[i];
      if (!p || typeof p !== 'object') return err('第 ' + (i + 1) + ' 筆點位不是物件');
      if (!p.id || !p.name || !p.category) return err('第 ' + (i + 1) + ' 筆點位缺少必填欄位');
      if (!d.categories[p.category]) return err('點位「' + p.id + '」的 category 不存在於 categories');
      if (typeof p.lat !== 'number' || typeof p.lng !== 'number') return err('點位「' + p.id + '」的 lat/lng 必須是數字');
    }
    return { ok: true };
  }

  // =========================================================
  // 2. 地理工具（精簡版，取自 js/geo.js）
  // =========================================================
  const R_EARTH = 6371000;
  const rad = (d) => (d * Math.PI) / 180;
  const deg = (r) => (r * 180) / Math.PI;

  function haversine(lat1, lng1, lat2, lng2) {
    const dLat = rad(lat2 - lat1), dLng = rad(lng2 - lng1);
    const a = Math.sin(dLat / 2) ** 2 + Math.cos(rad(lat1)) * Math.cos(rad(lat2)) * Math.sin(dLng / 2) ** 2;
    return 2 * R_EARTH * Math.asin(Math.min(1, Math.sqrt(a)));
  }
  function bearingOf(lat1, lng1, lat2, lng2) {
    const p1 = rad(lat1), p2 = rad(lat2), dl = rad(lng2 - lng1);
    const y = Math.sin(dl) * Math.cos(p2);
    const x = Math.cos(p1) * Math.sin(p2) - Math.sin(p1) * Math.cos(p2) * Math.cos(dl);
    return (deg(Math.atan2(y, x)) + 360) % 360;
  }
  function destinationOf(lat, lng, bearingDeg, distM) {
    const d = distM / R_EARTH, br = rad(bearingDeg);
    const p1 = rad(lat), l1 = rad(lng);
    const p2 = Math.asin(Math.sin(p1) * Math.cos(d) + Math.cos(p1) * Math.sin(d) * Math.cos(br));
    const l2 = l1 + Math.atan2(Math.sin(br) * Math.sin(d) * Math.cos(p1), Math.cos(d) - Math.sin(p1) * Math.sin(p2));
    return { lat: deg(p2), lng: ((deg(l2) + 540) % 360) - 180 };
  }

  // =========================================================
  // 3. 共用小工具
  // =========================================================
  const $ = (s) => document.querySelector(s);
  function toast(msg, ms) {
    const el = $('#toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => el.classList.remove('show'), ms || 2800);
  }
  function setStatus(msg) { $('#status').textContent = msg; }

  const qs = new URLSearchParams(location.search);
  const mockMode = qs.get('mock') === '1' || qs.has('mock');

  // =========================================================
  // 4. 解析點位資料
  // =========================================================
  const hashResult = await decodeAnyHash(location.hash);
  let DATA = null;
  if (hashResult.ok) {
    const v = validateData(hashResult.data);
    if (v.ok) {
      DATA = hashResult.data;
    } else {
      toast('點位資料格式錯誤：' + v.error, 5000);
    }
  } else if (hashResult.error) {
    toast(hashResult.error, 5000);
  }

  if (!DATA) {
    $('#hint').classList.add('show');
    if (hashResult.error) $('#hint-msg').textContent = hashResult.error;
  } else {
    $('#proj-name').textContent = DATA.project;
    $('#proj-sub').textContent = DATA.points.length + ' 個點位・' + (mockMode ? '模擬定位模式' : '');
  }

  // =========================================================
  // 5. 建立地圖（OpenFreeMap liberty style，免金鑰）
  // =========================================================
  const STYLE_URL = 'https://tiles.openfreemap.org/styles/liberty';

  let initCenter = [120.9738, 23.9738]; // 台灣中心，無資料時的預設
  let initZoom = 7;
  if (DATA) {
    const lats = DATA.points.map((p) => p.lat), lngs = DATA.points.map((p) => p.lng);
    initCenter = [(Math.min(...lngs) + Math.max(...lngs)) / 2, (Math.min(...lats) + Math.max(...lats)) / 2];
    initZoom = 16;
  }

  const map = new maplibregl.Map({
    container: 'map',
    style: STYLE_URL,
    center: initCenter,
    zoom: initZoom,
    pitch: 60,
    bearing: 0,
    attributionControl: { compact: true },
  });
  map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-right');

  let has3dBuilding = false;

  map.on('load', () => {
    // 3D 建築：liberty style 已內建 building-3d（fill-extrusion, source-layer building）
    has3dBuilding = !!map.getLayer('building-3d');
    if (!has3dBuilding) {
      // 沒有現成 layer 時，若 openmaptiles 來源存在就自行補一個
      try {
        if (map.getSource('openmaptiles')) {
          map.addLayer({
            id: 'building-3d-fallback',
            type: 'fill-extrusion',
            source: 'openmaptiles',
            'source-layer': 'building',
            minzoom: 14,
            paint: {
              'fill-extrusion-color': '#c9c2b6',
              'fill-extrusion-height': ['coalesce', ['get', 'render_height'], 6],
              'fill-extrusion-base': ['coalesce', ['get', 'render_min_height'], 0],
              'fill-extrusion-opacity': 0.8,
            },
          });
          has3dBuilding = true;
        }
      } catch (e) { /* style 沒有可用來源，放棄 3D 建築 */ }
    }
    window.__has3dBuilding = has3dBuilding; // 供驗收腳本讀取

    if (DATA) {
      addMarkers();
      initDrawer();
      fitToPoints();
      buildRoute();
    }
  });

  map.on('error', (e) => {
    console.error('[map error]', e && e.error);
  });

  // =========================================================
  // 6. 點位標記
  // =========================================================
  const ptMarkers = []; // { el, marker }，index 對應 DATA.points

  function addMarkers() {
    DATA.points.forEach((p, i) => {
      const cat = DATA.categories[p.category] || {};
      const color = cat.color || '#1a73e8';
      const el = document.createElement('div');
      el.className = 'mk';
      el.style.background = color;
      el.innerHTML = '<span>' + (i + 1) + '</span>';

      const navUrl = 'https://www.google.com/maps/dir/?api=1&destination=' + p.lat + ',' + p.lng + '&travelmode=driving';
      const noteHtml = p.note ? '<p class="pu-note">' + escapeHtml(p.note) + '</p>' : '';
      const popupHtml =
        '<div class="pu">' +
        '<p class="pu-title">' + (i + 1) + '. ' + escapeHtml(p.name) + '</p>' +
        '<p class="pu-cat">' + escapeHtml(cat.label || p.category) + '</p>' +
        noteHtml +
        '<a class="pu-nav" target="_blank" rel="noopener" href="' + navUrl + '">🧭 導航</a>' +
        '</div>';

      const marker = new maplibregl.Marker({ element: el, anchor: 'bottom' })
        .setLngLat([p.lng, p.lat])
        .setPopup(new maplibregl.Popup({ offset: 24 }).setHTML(popupHtml))
        .addTo(map);
      ptMarkers.push({ el, marker });
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function fitToPoints() {
    if (!DATA.points.length) return;
    const bounds = new maplibregl.LngLatBounds();
    DATA.points.forEach((p) => bounds.extend([p.lng, p.lat]));
    map.fitBounds(bounds, { padding: { top: 90, bottom: 140, left: 40, right: 40 }, pitch: 60, maxZoom: 18, duration: 0 });
  }

  // =========================================================
  // 6.5 底部抽屜點位清單（進度勾選存 localStorage）
  // =========================================================
  // 點集指紋：沿用 route_checklist 的 order|name|lat|lng rolling hash（h*31+c |0 → fp+hex）
  function computeFingerprint(points) {
    const s = points.map((p, i) => (i + 1) + '|' + p.name + '|' + p.lat + '|' + p.lng).join(';');
    let h = 0;
    for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
    return 'fp' + (h >>> 0).toString(16);
  }

  let progState = {};   // { "1": true, ... } key = 順序號（1 起算），同 route_checklist
  let progKeyName = '';
  const rowEls = [];    // index 對應 DATA.points

  function loadProg() {
    try { return JSON.parse(localStorage.getItem(progKeyName) || '{}') || {}; }
    catch (e) { return {}; }
  }
  function saveProg() {
    try { localStorage.setItem(progKeyName, JSON.stringify(progState)); }
    catch (e) { /* 無痕模式等 localStorage 不可用時靜默略過 */ }
  }
  function doneCount() {
    let n = 0;
    for (let i = 0; i < DATA.points.length; i++) if (progState[i + 1]) n++;
    return n;
  }
  function updateProgressUI() {
    const txt = '進度 ' + doneCount() + '/' + DATA.points.length;
    $('#prog-cap').textContent = txt + ' ▲';
    $('#drawer-title').textContent = txt;
  }
  function applyRowState(i) {
    const done = !!progState[i + 1];
    if (rowEls[i]) {
      rowEls[i].classList.toggle('done', done);
      const cb = rowEls[i].querySelector('input');
      if (cb) cb.checked = done;
    }
    if (ptMarkers[i]) ptMarkers[i].el.classList.toggle('mk-done', done);
  }
  function toggleDone(i) {
    if (progState[i + 1]) delete progState[i + 1];
    else progState[i + 1] = true;
    saveProg();
    applyRowState(i);
    updateProgressUI();
  }

  function flyToPoint(i) {
    const p = DATA.points[i];
    map.flyTo({ center: [p.lng, p.lat], zoom: 17.5, pitch: map.getPitch(), duration: 900 });
    if (ptMarkers[i]) {
      ptMarkers[i].el.classList.add('mk-hi');
      setTimeout(() => ptMarkers[i].el.classList.remove('mk-hi'), 1600);
    }
  }

  function setDrawerOpen(open) {
    $('#drawer').classList.toggle('open', open);
  }

  function initDrawer() {
    progKeyName = 'map3d_' + computeFingerprint(DATA.points);
    progState = loadProg();

    const list = $('#pt-list');
    DATA.points.forEach((p, i) => {
      const cat = DATA.categories[p.category] || {};
      const li = document.createElement('li');
      li.className = 'pt-row';
      const navUrl = 'https://www.google.com/maps/dir/?api=1&destination=' + p.lat + ',' + p.lng + '&travelmode=driving';
      const camUrl = './index.html' + location.hash; // 同源 ARCam，帶相同 #d=/#z=
      li.innerHTML =
        '<span class="pt-num">' + (i + 1) + '</span>' +
        '<span class="pt-color" style="background:' + (cat.color || '#1a73e8') + '"></span>' +
        '<span class="pt-name">' + escapeHtml(p.name) + '</span>' +
        '<label class="pt-check"><input type="checkbox" aria-label="完成"></label>' +
        '<a class="pt-btn pt-nav" target="_blank" rel="noopener" href="' + navUrl + '">導航</a>' +
        '<a class="pt-btn pt-cam" target="_blank" rel="noopener" href="' + camUrl + '">拍照</a>';

      li.querySelector('input').addEventListener('change', () => toggleDone(i));
      li.addEventListener('click', (e) => {
        if (e.target.closest('a, label, input')) return; // 按鈕/勾選不觸發 flyTo
        flyToPoint(i);
      });
      list.appendChild(li);
      rowEls.push(li);
      applyRowState(i);
    });

    updateProgressUI();
    $('#prog-cap').classList.add('avail');

    $('#prog-cap').addEventListener('click', () => setDrawerOpen(true));
    $('#btn-collapse').addEventListener('click', () => setDrawerOpen(false));
    $('#btn-next').addEventListener('click', () => {
      let idx = -1;
      for (let i = 0; i < DATA.points.length; i++) {
        if (!progState[i + 1]) { idx = i; break; }
      }
      if (idx < 0) { toast('全部點位都完成了 🎉'); return; }
      flyToPoint(idx);
      const row = rowEls[idx];
      row.scrollIntoView({ block: 'center', behavior: 'smooth' });
      row.classList.add('hl');
      setTimeout(() => row.classList.remove('hl'), 1600);
    });
  }

  // =========================================================
  // 7. OSRM 路線（一次呼叫所有 waypoint，失敗退回點對點直線）
  // =========================================================
  async function buildRoute() {
    const pts = DATA.points;
    if (pts.length < 2) return;
    const coordStr = pts.map((p) => p.lng + ',' + p.lat).join(';');
    const url = 'https://router.project-osrm.org/route/v1/driving/' + coordStr + '?overview=full&geometries=geojson';

    let geojsonCoords = null;
    let osrmInfo = '';
    try {
      const res = await fetch(url);
      osrmInfo = 'OSRM HTTP ' + res.status;
      if (res.ok) {
        const j = await res.json();
        if (j.code === 'Ok' && j.routes && j.routes[0]) {
          geojsonCoords = j.routes[0].geometry.coordinates;
          osrmInfo += '（code=' + j.code + '，' + geojsonCoords.length + ' 點，' + Math.round(j.routes[0].distance) + 'm）';
        } else {
          osrmInfo += '（code=' + j.code + '，退回直線）';
        }
      }
    } catch (e) {
      osrmInfo = 'OSRM 呼叫失敗（' + e.message + '），退回直線';
    }

    if (!geojsonCoords) {
      geojsonCoords = pts.map((p) => [p.lng, p.lat]); // 退回點對點直線
    }

    window.__osrmInfo = osrmInfo; // 供驗收腳本讀取
    setStatus(osrmInfo);

    const src = { type: 'Feature', geometry: { type: 'LineString', coordinates: geojsonCoords }, properties: {} };
    if (map.getSource('route')) {
      map.getSource('route').setData(src);
    } else {
      map.addSource('route', { type: 'geojson', data: src });
      map.addLayer({
        id: 'route-line',
        type: 'line',
        source: 'route',
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: { 'line-color': '#1a73e8', 'line-width': 5, 'line-opacity': 0.75 },
      }, has3dBuilding ? 'building-3d' : undefined);
    }
  }

  // =========================================================
  // 8. GPS 棋子 + 跟隨 / 自由瀏覽
  // =========================================================
  let followMode = true;
  let meLngLat = null;
  let heading = null;
  let watchId = null;
  let compassStarted = false;

  // 地面層：腳下陰影 + 方向扇形（貼地、隨 heading 旋轉）
  const groundEl = document.createElement('div');
  groundEl.className = 'me-ground';
  groundEl.innerHTML = '<div class="me-shadow"></div><div class="me-fan" id="me-fan" style="display:none"></div>';
  const groundMarker = new maplibregl.Marker({ element: groundEl, rotationAlignment: 'map', pitchAlignment: 'map' });

  // 看板小人：MECCHA CHAMELEON 黏土風 —— 全身乳白圓滑軟膠感（radial 漸層做立體高光）、
  // 極簡五官、四肢圓潤、深灰小相機蹲在頭頂（取代舉手姿勢）。三張視角圖（背/正/側）
  // 啟動時建好 DOM，之後只切 data-facing（CSS display），左側＝側面 scaleX(-1)。
  // 腿/手臂拆獨立 <g>（.leg-l/.leg-r/.arm-l/.arm-r）供行走動畫 CSS transform 擺動。
  const CAM_BODY = '#3a3f45', CAM_DARK = '#171a1d';

  // 每張 SVG 的漸層 ID 要 document 內唯一（三張同頁）→ 帶字尾
  function clayDefs(sfx) {
    return '<defs>' +
      '<radialGradient id="clay' + sfx + '" cx="35%" cy="28%" r="85%">' +
      '<stop offset="0%" stop-color="#ffffff"/>' +
      '<stop offset="55%" stop-color="#f1eee7"/>' +
      '<stop offset="100%" stop-color="#d5d0c5"/>' +
      '</radialGradient>' +
      '</defs>';
  }

  // 背/正視角共用軀幹：圓腿（動畫 group）、圓身、雙手舉高高（Y 字型，45° 外開，
  // capsule 手臂＋末端小圓手，動畫 group）、圓頭
  function clayBody(sfx) {
    const f = 'url(#clay' + sfx + ')';
    return clayDefs(sfx) +
      '<g class="leg-l"><rect x="15.6" y="45" width="5.6" height="14" rx="2.8" fill="' + f + '"/></g>' +
      '<g class="leg-r"><rect x="22.8" y="45" width="5.6" height="14" rx="2.8" fill="' + f + '"/></g>' +
      '<ellipse cx="22" cy="37.5" rx="9.2" ry="10.8" fill="' + f + '"/>' +
      '<g class="arm-l">' +
      '<rect x="12.4" y="18" width="4.4" height="13.5" rx="2.2" transform="rotate(-45 14.6 30.5)" fill="' + f + '"/>' +
      '<circle cx="5.8" cy="21.7" r="2.3" fill="' + f + '"/>' +
      '</g>' +
      '<g class="arm-r">' +
      '<rect x="27.2" y="18" width="4.4" height="13.5" rx="2.2" transform="rotate(45 29.4 30.5)" fill="' + f + '"/>' +
      '<circle cx="38.2" cy="21.7" r="2.3" fill="' + f + '"/>' +
      '</g>' +
      '<circle cx="22" cy="19" r="10" fill="' + f + '"/>';
  }

  // 頭頂小相機（三個角度）
  function camBack() {
    return '<rect x="15.5" y="3" width="13" height="7.8" rx="2" fill="' + CAM_BODY + '"/>' +
      '<rect x="24.8" y="1.4" width="3" height="2.2" rx="0.9" fill="' + CAM_BODY + '"/>' +
      '<rect x="17.3" y="4.6" width="8.4" height="4.4" rx="0.8" fill="#6b7683"/>';
  }
  function camFront() {
    return '<rect x="15.5" y="3" width="13" height="7.8" rx="2" fill="' + CAM_BODY + '"/>' +
      '<rect x="24.8" y="1.4" width="3" height="2.2" rx="0.9" fill="' + CAM_BODY + '"/>' +
      '<circle cx="22" cy="6.9" r="2.5" fill="' + CAM_DARK + '"/>' +

  function camSide() {
    return '<rect x="17.5" y="3" width="9.5" height="7.8" rx="1.8" fill="' + CAM_BODY + '"/>' +
      '<rect x="19" y="1.4" width="3" height="2.2" rx="0.9" fill="' + CAM_BODY + '"/>' +
      '<rect x="26.6" y="4.7" width="3.4" height="4.2" rx="1" fill="' + CAM_DARK + '"/>';
  }

  // 背面：無五官
  const CHAR_SVG_BACK =
    '<svg class="v-back" viewBox="0 0 44 64" xmlns="http://www.w3.org/2000/svg" aria-label="我的位置（背面）">' +
    clayBody('B') + camBack() + '</svg>';

  // 正面：極簡雙眼
  const CHAR_SVG_FRONT =
    '<svg class="v-front" viewBox="0 0 44 64" xmlns="http://www.w3.org/2000/svg" aria-label="我的位置（正面）">' +
    clayBody('F') +
    '<ellipse cx="18.6" cy="19.8" rx="1.15" ry="1.6" fill="#6b6b64"/>' +
    '<ellipse cx="25.4" cy="19.8" rx="1.15" ry="1.6" fill="#6b6b64"/>' +
    camFront() + '</svg>';

  // 側面（右側身，左側由 CSS 鏡射）：雙臂同樣舉高（Y 字），前臂正常色、後臂略深做層次；
  // 後腿稍深、身形較窄、單眼靠前緣、鏡頭朝行進方向
  const CHAR_SVG_SIDE = (function () {
    const f = 'url(#clayS)';
    return '<svg class="v-side" viewBox="0 0 44 64" xmlns="http://www.w3.org/2000/svg" aria-label="我的位置（側面）">' +
      clayDefs('S') +
      '<g class="leg-l"><rect x="17.4" y="45" width="5.4" height="14" rx="2.7" fill="#dedacf"/></g>' +
      '<g class="leg-r"><rect x="21.4" y="45" width="5.6" height="14" rx="2.8" fill="' + f + '"/></g>' +
      // 後臂（略深，往身後斜上舉）
      '<g class="arm-l">' +
      '<rect x="18.9" y="14.5" width="4.2" height="16" rx="2.1" transform="rotate(-40 21 30)" fill="#ddd8cd"/>' +
      '<circle cx="11.4" cy="18.5" r="2.1" fill="#ddd8cd"/>' +
      '</g>' +
      '<ellipse cx="22" cy="37.5" rx="7.6" ry="10.8" fill="' + f + '"/>' +
      '<circle cx="22" cy="19" r="10" fill="' + f + '"/>' +
      '<ellipse cx="28.2" cy="19.8" rx="1.1" ry="1.55" fill="#6b6b64"/>' +
      // 前臂（正常色，往身前斜上舉；畫在頭後面避免遮臉，手掌探出頭緣）
      '<g class="arm-r">' +
      '<rect x="20.8" y="14.5" width="4.4" height="16" rx="2.2" transform="rotate(40 23 30)" fill="' + f + '"/>' +
      '<circle cx="32.6" cy="18.5" r="2.2" fill="' + f + '"/>' +
      '</g>' +
      camSide() + '</svg>';
  })();

  // 斜前 3/4（朝右前，左斜由 CSS 鏡射）：遠臂較短居後、近臂全開、雙眼偏右近眼較大、
  // 鏡頭偏右、頭/身微移做轉身感
  const CHAR_SVG_QFRONT = (function () {
    const f = 'url(#clayQF)';
    return '<svg class="v-qfront" viewBox="0 0 44 64" xmlns="http://www.w3.org/2000/svg" aria-label="我的位置（斜前）">' +
      clayDefs('QF') +
      '<g class="leg-l"><rect x="16.8" y="45" width="5.4" height="14" rx="2.7" fill="#e3dfd4"/></g>' +
      '<g class="leg-r"><rect x="22.6" y="45" width="5.6" height="14" rx="2.8" fill="' + f + '"/></g>' +
      // 遠臂（左，較短較直、略深，畫在身體後）
      '<g class="arm-l">' +
      '<rect x="14.4" y="20.5" width="4.2" height="12" rx="2.1" transform="rotate(-30 16.5 31.5)" fill="#e3dfd4"/>' +
      '<circle cx="11" cy="21.8" r="2.1" fill="#e3dfd4"/>' +
      '</g>' +
      '<ellipse cx="21.6" cy="37.5" rx="8.6" ry="10.8" fill="' + f + '"/>' +
      // 近臂（右，45° 全開）
      '<g class="arm-r">' +
      '<rect x="27.2" y="18" width="4.4" height="13.5" rx="2.2" transform="rotate(45 29.4 30.5)" fill="' + f + '"/>' +
      '<circle cx="38.2" cy="21.7" r="2.3" fill="' + f + '"/>' +
      '</g>' +
      '<circle cx="22.4" cy="19" r="10" fill="' + f + '"/>' +
      '<ellipse cx="21.8" cy="20" rx="1.05" ry="1.5" fill="#6b6b64"/>' +
      '<ellipse cx="28" cy="19.8" rx="1.2" ry="1.65" fill="#6b6b64"/>' +
      '<rect x="16.2" y="3" width="12.6" height="7.8" rx="2" fill="' + CAM_BODY + '"/>' +
      '<rect x="24.6" y="1.4" width="3" height="2.2" rx="0.9" fill="' + CAM_BODY + '"/>' +
      '<ellipse cx="26" cy="6.9" rx="2.1" ry="2.4" fill="' + CAM_DARK + '"/>' +
      '<ellipse cx="26" cy="6.9" rx="1.15" ry="1.35" fill="#4f7cae"/>' +
      '</svg>';
  })();

  // 斜後 3/4（朝右後，左斜由 CSS 鏡射）：無五官、遠臂較短居後、近臂全開、
  // 相機背面螢幕偏左（轉身透視）、頭/身微移
  const CHAR_SVG_QBACK = (function () {
    const f = 'url(#clayQB)';
    return '<svg class="v-qback" viewBox="0 0 44 64" xmlns="http://www.w3.org/2000/svg" aria-label="我的位置（斜後）">' +
      clayDefs('QB') +
      '<g class="leg-l"><rect x="16.8" y="45" width="5.4" height="14" rx="2.7" fill="#e3dfd4"/></g>' +
      '<g class="leg-r"><rect x="22.6" y="45" width="5.6" height="14" rx="2.8" fill="' + f + '"/></g>' +
      '<g class="arm-l">' +
      '<rect x="14.4" y="20.5" width="4.2" height="12" rx="2.1" transform="rotate(-30 16.5 31.5)" fill="#e3dfd4"/>' +
      '<circle cx="11" cy="21.8" r="2.1" fill="#e3dfd4"/>' +
      '</g>' +
      '<ellipse cx="21.6" cy="37.5" rx="8.6" ry="10.8" fill="' + f + '"/>' +
      '<g class="arm-r">' +
      '<rect x="27.2" y="18" width="4.4" height="13.5" rx="2.2" transform="rotate(45 29.4 30.5)" fill="' + f + '"/>' +
      '<circle cx="38.2" cy="21.7" r="2.3" fill="' + f + '"/>' +
      '</g>' +
      '<circle cx="21.6" cy="19" r="10" fill="' + f + '"/>' +
      '<rect x="16.2" y="3" width="12.6" height="7.8" rx="2" fill="' + CAM_BODY + '"/>' +
      '<rect x="18.4" y="1.4" width="3" height="2.2" rx="0.9" fill="' + CAM_BODY + '"/>' +
      '<rect x="17.4" y="4.6" width="6.8" height="4.4" rx="0.8" fill="#6b7683"/>' +
      '</svg>';
  })();

  const charEl = document.createElement('div');
  charEl.className = 'me-char';
  charEl.dataset.facing = 'back'; // 全無方向資料時固定背面
  // char-flip 內層包一層做左向鏡射（MapLibre 會直接改 marker 元素的 inline transform，
  // 鏡射不能掛在 charEl 本身）；5 張視角圖疊在同位置，用 opacity 交叉淡化
  charEl.innerHTML = '<div class="char-flip">' +
    CHAR_SVG_BACK + CHAR_SVG_FRONT + CHAR_SVG_SIDE + CHAR_SVG_QFRONT + CHAR_SVG_QBACK +
    '</div>';
  const meMarker = new maplibregl.Marker({ element: charEl, anchor: 'bottom' }); // viewport 對齊＝billboard

  // ---- 行走動畫觸發：GPS 有實際移動就加 .walking，靜止 1.5s 後移除回立正 ----
  // 只切 class（CSS animation 純 transform，GPU 合成），不重建 DOM
  let walkTimer = null;
  function setWalking() {
    charEl.classList.add('walking');
    clearTimeout(walkTimer);
    walkTimer = setTimeout(() => charEl.classList.remove('walking'), 1500);
  }

  // ---- 八方向切換：relAngle = (heading − mapBearing) 正規化 0–360，45° 一格 ----
  // back(0) / back-right(45) / right(90) / front-right(135) / front(180) /
  // front-left(225) / left(270) / back-left(315)
  // hysteresis ±5°：目標分區與現值不同時，要越過邊界 5° 以上
  // （離新分區中心 ≤22.5−5＝17.5°）才切，濾掉邊界抖動。
  const FACING_ORDER = ['back', 'back-right', 'right', 'front-right', 'front', 'front-left', 'left', 'back-left'];
  const FACING_CENTER = { back: 0, 'back-right': 45, right: 90, 'front-right': 135, front: 180, 'front-left': 225, left: 270, 'back-left': 315 };
  const FACING_HYST_DEG = 5;
  let facing = 'back';
  let moveHeading = null;   // 無羅盤時的移動方向 fallback
  let lastMovePos = null;   // 上一個 GPS 位置（算移動方向用）

  function angDist(a, b) {
    const d = Math.abs(a - b) % 360;
    return d > 180 ? 360 - d : d;
  }

  function effectiveHeading() {
    if (heading != null) return heading;   // 羅盤優先
    return moveHeading;                    // 沒羅盤用移動方向；再沒有回 null（固定背面）
  }

  // 朝向切換＝改 data-facing（CSS opacity 交叉淡化 120ms，不重建節點）。
  // 上一次淡化未完成又要切 → 加 .no-fade 讓所有圖直接跳結束態（單次 reflow），
  // 避免連續快轉時多張殘影疊加。
  let fadeTimer = null;
  function setFacing(f) {
    if (facing === f) return;
    facing = f;
    if (fadeTimer) {
      clearTimeout(fadeTimer);
      fadeTimer = null;
      charEl.classList.add('no-fade');
      charEl.dataset.facing = f;
      void charEl.offsetWidth; // 讓 no-fade 狀態立刻套用（一次性 reflow，僅快切時）
      charEl.classList.remove('no-fade');
    } else {
      charEl.dataset.facing = f;
      fadeTimer = setTimeout(() => { fadeTimer = null; }, 130);
    }
  }

  function updateFacing() {
    const h = effectiveHeading();
    if (h == null) { setFacing('back'); return; }
    const rel = ((h - map.getBearing()) % 360 + 360) % 360;
    const target = FACING_ORDER[Math.round(rel / 45) % 8];
    if (target !== facing && angDist(rel, FACING_CENTER[target]) <= 22.5 - FACING_HYST_DEG) {
      setFacing(target);
    }
  }

  map.on('rotate', updateFacing);
  map.on('rotateend', updateFacing);

  function updateMe(lat, lng) {
    meLngLat = [lng, lat];
    if (!meMarker._map) {
      groundMarker.setLngLat(meLngLat).addTo(map);
      meMarker.setLngLat(meLngLat).addTo(map);
    } else {
      groundMarker.setLngLat(meLngLat);
      meMarker.setLngLat(meLngLat);
    }

    // 移動偵測：>0.5m 觸發行走動畫；>1m 更新移動方向 fallback（靜止沿用上次值）
    if (lastMovePos) {
      const moved = haversine(lastMovePos.lat, lastMovePos.lng, lat, lng);
      if (moved > 0.5) setWalking();
      if (moved > 1) {
        moveHeading = bearingOf(lastMovePos.lat, lastMovePos.lng, lat, lng);
        lastMovePos = { lat, lng };
        if (heading == null) {
          groundMarker.setRotation(moveHeading); // 腳下扇形也跟移動方向
          const fan = $('#me-fan');
          if (fan) fan.style.display = 'block';
        }
        updateFacing();
      }
    } else {
      lastMovePos = { lat, lng };
    }

    if (followMode) {
      map.easeTo({
        center: meLngLat,
        bearing: heading != null ? heading : map.getBearing(),
        pitch: 60,
        zoom: Math.min(18, Math.max(17, map.getZoom())),
        duration: 700,
      });
    }
  }

  function updateHeading(h) {
    heading = h;
    const fan = $('#me-fan');
    if (fan) fan.style.display = 'block';
    groundMarker.setRotation(h); // 只轉腳下扇形，小人本體不旋轉（用換圖表現朝向）
    updateFacing();
    if (followMode && meLngLat) {
      map.easeTo({ bearing: h, duration: 400 });
    }
  }

  // ---- 真實 GPS ----
  function startRealGeo() {
    if (!('geolocation' in navigator)) { setStatus('此裝置不支援定位'); return; }
    watchId = navigator.geolocation.watchPosition(
      (pos) => updateMe(pos.coords.latitude, pos.coords.longitude),
      (err) => toast('定位失敗：' + err.message, 3000),
      { enableHighAccuracy: true, maximumAge: 1000, timeout: 15000 }
    );
  }

  function startCompass() {
    if (compassStarted) return;
    compassStarted = true;
    window.addEventListener('deviceorientationabsolute', onOrientation, true);
    window.addEventListener('deviceorientation', onOrientation, true);
  }
  // 自適應羅盤平滑：小角度差 EMA alpha 0.5 快跟（濾感測抖動）、
  // 角度差 >30° 立即跳到新值（真轉身零延遲）。事件鏈
  // deviceorientation → onOrientation → handleSensorHeading → updateHeading → updateFacing
  // 全程同步、無節流/debounce，不丟事件。
  let smoothedHeading = null;
  const HEADING_EMA_ALPHA = 0.5;
  const HEADING_JUMP_DEG = 30;
  function handleSensorHeading(raw) {
    if (smoothedHeading === null) {
      smoothedHeading = raw;
    } else {
      const d = ((raw - smoothedHeading + 540) % 360) - 180; // -180..180 最短角差
      if (Math.abs(d) > HEADING_JUMP_DEG) smoothedHeading = raw;                       // 大角度：立即跳
      else smoothedHeading = ((smoothedHeading + HEADING_EMA_ALPHA * d) % 360 + 360) % 360; // 小角度：快跟
    }
    updateHeading(smoothedHeading);
  }

  function onOrientation(e) {
    let h = null;
    if (typeof e.webkitCompassHeading === 'number' && !isNaN(e.webkitCompassHeading)) h = e.webkitCompassHeading;
    else if (typeof e.alpha === 'number' && e.alpha !== null) h = (360 - e.alpha) % 360;
    if (h == null || isNaN(h)) return;
    handleSensorHeading(h);
  }

  $('#btn-compass').addEventListener('click', async () => {
    const D = window.DeviceOrientationEvent;
    if (D && typeof D.requestPermission === 'function') {
      try {
        const res = await D.requestPermission();
        if (res !== 'granted') { toast('未取得方向感應權限'); return; }
      } catch (e) { toast('方向感應權限請求失敗'); return; }
    }
    startCompass();
    $('#btn-compass').style.display = 'none';
  });

  // iOS 需要按鈕手勢才能要權限；先偵測是否需要顯示按鈕
  if (window.DeviceOrientationEvent && typeof window.DeviceOrientationEvent.requestPermission === 'function') {
    $('#btn-compass').style.display = 'inline-flex';
  } else if (window.DeviceOrientationEvent) {
    startCompass(); // Android 等不需明確授權
  }

  // ---- 模擬 GPS（?mock=1，桌機/無 GPS 環境測試跟隨模式用） ----
  function startMockGeo() {
    if (!DATA || !DATA.points.length) return;
    let targetIdx = 0;
    let target = DATA.points[0];
    const start = destinationOf(target.lat, target.lng, 225, 200); // 目標西南方 200m 出發
    let pos = { lat: start.lat, lng: start.lng };
    setStatus('模擬定位：朝第 1 個點位前進中…');
    const timer = setInterval(() => {
      const d = haversine(pos.lat, pos.lng, target.lat, target.lng);
      if (d > 2) {
        const br = bearingOf(pos.lat, pos.lng, target.lat, target.lng);
        const step = Math.min(8, d);
        pos = destinationOf(pos.lat, pos.lng, br, step);
        updateHeading(br);
      } else {
        targetIdx = (targetIdx + 1) % DATA.points.length;
        target = DATA.points[targetIdx];
        setStatus('模擬定位：朝第 ' + (targetIdx + 1) + ' 個點位前進中…');
      }
      updateMe(pos.lat, pos.lng);
    }, 1000);
    window.__mockTimer = timer;
  }

  // =========================================================
  // 9. 控制鈕：跟隨 / 自由、定位
  // =========================================================
  function setFollowUI() {
    const btn = $('#btn-follow');
    btn.classList.toggle('on', followMode);
    btn.innerHTML = followMode ? '<span class="ic">🎮</span>跟隨中' : '<span class="ic">🗺️</span>自由瀏覽';
  }
  setFollowUI();

  $('#btn-follow').addEventListener('click', () => {
    followMode = !followMode;
    setFollowUI();
    if (followMode && meLngLat) {
      map.easeTo({ center: meLngLat, bearing: heading != null ? heading : map.getBearing(), pitch: 60, zoom: 17.5, duration: 700 });
    }
  });

  $('#btn-locate').addEventListener('click', () => {
    if (meLngLat) {
      map.easeTo({ center: meLngLat, zoom: 17.5, pitch: 60, duration: 700 });
    } else {
      toast('尚未取得目前位置');
    }
  });

  // 使用者手動拖曳/縮放地圖時自動切到自由瀏覽
  ['dragstart', 'zoomstart', 'rotatestart', 'pitchstart'].forEach((ev) => {
    map.on(ev, (e) => {
      if (e.originalEvent && followMode) {
        followMode = false;
        setFollowUI();
      }
    });
  });

  // =========================================================
  // 10. 啟動定位來源
  // =========================================================
  if (mockMode) {
    startMockGeo();
  } else if (DATA) {
    startRealGeo();
  }

  window.__mapReady = map; // 供驗收腳本讀取
  window.__test = {       // 驗收 hook
    setHeading: (h) => updateHeading(h),          // 直接餵 heading（略過平滑）
    sensorHeading: (h) => handleSensorHeading(h), // 走感測器平滑路徑
    getSmoothed: () => smoothedHeading,
    getFacing: () => facing,
    isWalking: () => charEl.classList.contains('walking'),
    updateFacing,
  };
})().catch((e) => {
  console.error('[init error]', e);
  const el = document.getElementById('toast');
  if (el) { el.textContent = '初始化失敗：' + e.message; el.classList.add('show'); }
});
</script>

</body>
</html>
